# ==============================================================================
# PIMBA v3.0 — Main configuration file
# ==============================================================================
#
# This config file controls parameters for the Prepare, Run, Curate, and Plot modules of PIMBA.
#
# IMPORTANT:
#   1. Use absolute paths rather than relative paths.
#   2. Keep path values inside quotes, especially paths containing spaces.
#   3. A trailing slash on directory paths is optional in YAML, but consistency
#      can make the configuration easier to read.
#   4. Parameters belonging to an unused module or input type may be left empty.
#   5. Empty values are represented here as empty strings: ''.
#   6. Values such as 'yes' and 'no' are quoted deliberately. Without quotes,
#      some YAML parsers may interpret similar words as Boolean values.
#   7. This commented version preserves every value from the original config.
#
# The main workflow is normally launched with a command similar to:
#
# bash pimba_smk_main.sh \
#   -p paired_end \
#   -r COI-BOLD \
#   -g yes \
#   -l no \
#   -t 8 \
#   -c config/config.yaml \
#   -d .
#
# The command-line choices determine which sections below are actually used.
# ==============================================================================


# ==============================================================================
# SINGULARITY STORAGE
# ==============================================================================
#
# PIMBA executes its software dependencies from Singularity image files.
# These directories should be writable by the user running the workflow.
#
# On shared systems, using a fast local disk or scratch filesystem for cache and
# temporary files can substantially improve performance and avoid filling the
# home directory.
# ------------------------------------------------------------------------------

# Directory in which PIMBA stores its final Singularity Image Format (.sif)
# files. Existing images can be reused, so they do not need to be downloaded
# again for every run.
#
# Use an absolute path to a writable directory.
sif_dir: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/pimba_smk/sif_files/'

# Directory used for the Singularity cache.
#
# The cache may contain downloaded OCI layers and intermediate image content.
# It can grow considerably during image downloads or conversions. 
# This option is useful for controlling where Singularity stores reusable 
# cached data.
cache_dir: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/pimba_smk/singularity/'

# Directory used for temporary files created during container operations.
#
# This directory should have sufficient free disk space. Prefer a local Linux
# filesystem or fast scratch filesystem when possible. Under WSL, operations
# inside '/mnt/c/' may be slower than operations inside the Linux filesystem.
temp_dir: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/pimba_smk/tmp/'


# ==============================================================================
# COMPUTATIONAL RESOURCES
# ==============================================================================

# Maximum number of CPU threads available to individual PIMBA tasks that support
# parallel execution.
#
# This value should normally agree with the '-t' value supplied to
# 'pimba_smk_main.sh'. The launcher may pass the command-line thread count to
# Snakemake, while this parameter can also be read by individual workflow rules.
num_threads: 8


# ==============================================================================
# PIMBA PREPARE — GENERAL READ-PROCESSING OPTIONS
# ==============================================================================
#
# Prepare mode preprocesses raw sequencing reads before OTU/ASV inference.
# These general options are used by the selected preparation strategy:
#   - paired_end
#   - single_index
#   - dual_index
#
# Prepare mode can be skipped with '-p no' when a suitable processed FASTA file
# already exists in the expected workflow location.
# ------------------------------------------------------------------------------

# Minimum read length, in nucleotides, retained after quality filtering.
#
# Reads shorter than this threshold are discarded. A stricter value removes
# short reads but may reduce read recovery. Choose the value according to the
# expected amplicon length and sequencing quality.
minlength: 100

# Minimum PHRED quality score used during read-quality filtering.
#
# A value of 20 corresponds to an estimated base-call error probability of 1%.
# Higher values are stricter and may remove more sequence data.
minphred: 20

# Base name of the processed FASTA file generated by Prepare mode.
#
# Do not add the '.fasta' extension; PIMBA adds it automatically.
# With the current value, the expected output name is:
#   AllSamples.fasta
outputprepare: 'AllSamples'


# ==============================================================================
# PIMBA PREPARE — PAIRED-END READS
# ==============================================================================
#
# This section is used when the launcher is called with:
#   -p paired_end
#
# Raw paired-end filenames should follow the naming convention expected by the
# workflow, containing distinguishable R1 and R2 tokens.
# ------------------------------------------------------------------------------

# Directory containing the raw paired-end FASTQ files.
#
# Use the directory path, not the path to an individual FASTQ file.
# The workflow searches this directory for matching forward and reverse reads.
rawdatadir: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/pimba_smk/test_data/rawdata_COI/'

# Adapter-definition file used during preprocessing.
#
# The repository provides an example under 'resources/adapters.txt'. Confirm
# that its sequences match the library preparation and primers used for the
# current dataset.
adapters: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/pimba_smk/resources/adapters.txt'

# Minimum number of overlapping nucleotides required to merge paired reads.
#
# This config uses 10 bases as the default. Larger values require stronger
# overlap evidence but can reject pairs from longer amplicons or shorter reads.
minoverlap: 10

# Minimum similarity across the overlap when OverlapPER is selected.
#
# Expressed as a fraction:
#   0.9 = 90% identity
#
# This option applies specifically to OverlapPER.
# It may be ignored when 'merger' is set to 'pear'.
minsim: 0.9

# Program used to merge paired-end reads.
#
# Accepted values:
#   'pear'       — use PEAR
#   'overlapper' — use OverlapPER
#
# Keep the spelling and lowercase form expected by the workflow.
merger: 'pear'


# ==============================================================================
# PIMBA PREPARE — SINGLE-END READS WITH A SINGLE INDEX
# ==============================================================================
#
# This section is used when the launcher is called with:
#   -p single_index
#
# It is not used for the current paired-end example, so the values may remain
# empty. Populate all required fields before selecting single-index mode.
# ------------------------------------------------------------------------------

# Path to the single raw FASTQ file used in single-index mode.
raw_fastq_single: ''

# Prefix added to files generated during demultiplexing and preprocessing.
# Choose a concise dataset-specific identifier without spaces when possible.
prefix: ''

# Path to the text file describing barcodes located at the 5' end of reads.
barcodes_5end_txt: ''

# Adapter sequence expected in the single-end reads.
#
# Enter the nucleotide sequence directly, rather than a file path
singleadapter: ''

# Path to the FASTA representation corresponding to 'barcodes_5end_txt'.
barcodes_5end_fasta: ''


# ==============================================================================
# PIMBA PREPARE — SINGLE-END READS WITH DUAL INDEXES
# ==============================================================================
#
# This section is used when the launcher is called with:
#   -p dual_index
#
# It is not used for the current paired-end example. Populate these fields only
# when processing single-end data carrying both 5' and 3' indexes.
# ------------------------------------------------------------------------------

# Path to the single raw FASTQ file used in dual-index mode.
raw_fastq_dual: ''

# Path to the text file containing barcodes located at the 3' end.
barcodes_3end_txt: ''

# Path to the file containing reverse-complemented 3' barcode sequences.
barcodes_3end_rev: ''

# Path to the FASTA representation corresponding to 'barcodes_3end_txt'.
barcodes_3end_fasta: ''

# Directory containing the 5' barcode FASTA and TXT files.
#
# Each 3' barcode should have a corresponding set of associated 5' barcodes.
barcodes_5end_dir: ''

# Forward primer/adapter nucleotide sequence used in dual-index mode.
forward_adapter: ''

# Reverse primer/adapter nucleotide sequence used in dual-index mode.
reverse_adapter: ''


# ==============================================================================
# PIMBA RUN — OTU/ASV INFERENCE AND TAXONOMIC ASSIGNMENT
# ==============================================================================
#
# Run mode takes the processed reads, constructs OTUs or ASVs, assigns taxonomy,
# and creates the main abundance and sequence outputs.
#
# The '-r' argument supplied to the launcher should match 'marker_gene' for a
# built-in database. For a custom database, both should refer to the custom
# database directory as required by the launcher.
# ------------------------------------------------------------------------------

# Name of the output folder or analysis prefix created by Run mode.
#
# Descriptive names are useful, but remember that changing analytical thresholds
# without updating this name can make results difficult to distinguish.
#
# The current name indicates:
#   97clust  -> OTU clustering at 97% identity
#   90assign -> taxonomic assignment at 90% identity
outputrun: 'AllSamples_97clust90assign'

# Sequence-inference strategy.
#
# Accepted values:
#   'otu' — cluster sequences into OTUs using VSEARCH
#   'asv' — infer sequence variants using Swarm
strategy: 'otu'

# Sequence-identity threshold used for OTU clustering.
#
# Expressed as a fraction:
#   0.97 = 97% identity
#
# This parameter is primarily relevant when 'strategy' is 'otu'.
otu_similarity: 0.97

# Minimum sequence identity required for taxonomic assignment.
#
# Expressed as a fraction:
#   0.9 = 90% identity
#
# Lower thresholds recover more assignments but increase the risk of assigning
# distantly related references. Appropriate thresholds depend on the marker,
# taxonomic rank, database quality, and study goals.
assign_similarity: 0.9

# Minimum fraction of the query sequence that must be covered by an alignment.
#
# Expressed as a fraction:
#   0.9 = 90% query coverage
#
# This helps prevent short local matches from being treated as complete
# taxonomic evidence.
mincoverage: 0.9

# Target sequence length used for trimming before downstream analysis.
#
# Set to 0 to disable this trimming step. With the current value, sequences are
# trimmed or filtered according to a target/minimum length of 200 nt.
otu_length: 200

# Number of database hits retained or considered per query.
#
#   1   -> use the best hit
#   > 1 -> use multiple hits and determine taxonomy by majority/consensus
#
# Multi-hit curation requires this value to be greater than 1 and the Curate
# parameter 'mode' to be set to 'multi'.
hits_per_subject: 1

# Marker gene and reference database used for taxonomic assignment.
#
# Built-in values listed in the README:
#   '16S-SILVA'
#   '16S-GREENGENES'
#   '16S-RDP'
#   '16S-NCBI'
#   'COI-NCBI'
#   'COI-BOLD'
#   'ITS-PLANTS-NCBI'
#   'ITS-FUNGI-UNITE'
#   'ITS-FUNGI-NCBI'
#   'ALL-NCBI'
#
# A path to a custom database directory may also be used.
#
# Only the path associated with the selected built-in database is expected to
# be used during the analysis.
marker_gene: 'COI-BOLD'

# BLAST expectation-value threshold.
#
# Smaller values are more stringent. The the default is 0.001.
# Identity and coverage thresholds are applied separately through
# 'assign_similarity' and 'mincoverage'.
e_value: 0.001

# Enable or disable LULU post-clustering curation.
#
# Accepted values:
#   'yes' — run LULU to identify and remove likely erroneous OTUs/ASVs
#   'no'  — retain the original OTU/ASV set
#
# LULU can reduce artefactual diversity, but its ecological assumptions and
# thresholds should be appropriate for the dataset.
lulu: 'no'

# Indicate whether the amplicons represent the ITS marker.
#
# Accepted values:
#   'yes' — enable ITS-specific processing
#   'no'  — do not run ITS-specific processing
#
# For the current COI analysis, 'no' is appropriate.
ITS: 'no'

# Select remote or local BLAST operation.
#
# Accepted values:
#   'yes' — use NCBI remote BLAST, avoiding a local NCBI sequence database
#   'no'  — use a locally installed reference database
#
# This setting is principally relevant to NCBI-backed marker choices. COI-BOLD
# uses the local directory configured under 'COI-BOLD-DB'; therefore, the
# workflow may ignore 'remote' for this marker.
remote: 'yes'

# Name of the NCBI nucleotide BLAST database used in remote or local NCBI mode.
#
# Common examples include:
#   'nt'
#   'core_nt'
#
# This option is generally irrelevant to COI-BOLD, SILVA, Greengenes, RDP, and
# UNITE analyses because those use their own reference databases.
db_type: 'nt'

# BLAST nucleotide-search task.
#
# Common supported choices:
#   'megablast'    — optimized for highly similar nucleotide sequences
#   'blastn-short' — intended for short nucleotide queries
#
# 'megablast' is generally suitable for standard metabarcoding assignments to
# closely related reference sequences.
blast_type: 'megablast'


# ==============================================================================
# REFERENCE DATABASE PATHS
# ==============================================================================
#
# Use absolute paths to directories containing the downloaded and prepared
# databases. Only the database selected by 'marker_gene' should be required for
# a given run, although validation scripts may check additional dependencies.
#
# Built-in non-NCBI databases must normally contain the FASTA/reference files and
# taxonomy file expected by PIMBA.
#
# NCBI analyses additionally require:
#   - 'NCBI-DB' for local BLAST, unless remote mode is used
#   - 'taxdump' for translating NCBI taxonomic identifiers
# ------------------------------------------------------------------------------

# SILVA 16S reference database directory.
# Required when marker_gene is '16S-SILVA'.
16S-SILVA-DB: ''

# BOLD COI reference database directory.
# Required when marker_gene is 'COI-BOLD'.
#
# This is the active database path in the current configuration.
COI-BOLD-DB: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/COI_BOLD/'

# Greengenes 16S reference database directory.
# Required when marker_gene is '16S-GREENGENES'.
16S-GREENGENES-DB: ''

# RDP 16S reference database directory.
# Required when marker_gene is '16S-RDP'.
16S-RDP-DB: ''

# Local NCBI BLAST database directory.
#
# Required for local analyses using:
#   '16S-NCBI'
#   'COI-NCBI'
#   'ITS-PLANTS-NCBI'
#   'ITS-FUNGI-NCBI'
#   'ALL-NCBI'
#
# It may remain empty when a supported NCBI analysis is run entirely through
# remote BLAST, depending on workflow validation requirements.
NCBI-DB: ''

# UNITE fungal ITS reference database directory.
# Required when marker_gene is 'ITS-FUNGI-UNITE'.
ITS-FUNGI-UNITE-DB: ''

# Directory containing the extracted NCBI taxonomy dump.
#
# The README instructs users to download and extract 'new_taxdump.tar.gz'.
# The directory should contain the taxonomy files expected by the workflow,
# rather than the compressed archive itself.
#
# This is required for NCBI-based taxonomic processing.
taxdump: ''


# ==============================================================================
# PIMBA CURATE — TAXONOMIC STANDARDIZATION AND VALIDATION
# ==============================================================================
#
# PIMBA Curate integrates the abundance table, representative sequences, BLAST
# results, and reference taxonomy, then standardizes and validates assignments.
#
# It is run separately, for example:
#
# bash pimba_smk_curate.sh -t 8 -c config/config.yaml -d .
# ------------------------------------------------------------------------------

# Path to the local SQLite taxonomy database used by the R package 'taxizedb'
# for species-name validation.
#
# A PIMBA-compatible prebuilt database is available through
# the Zenodo resource linked in the README.
#
# Path for the database containing directory.
ncbi_taxizedb: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/ncbi'

# BLAST-hit import mode used by PIMBA Curate.
#
# Accepted values:
#   'single' — retain only the highest-scoring hit for each OTU/ASV
#   'multi'  — retain all recovered hits
#
# 'multi' is available only when 'hits_per_subject' is greater than 1.
# The current combination is consistent:
#   hits_per_subject: 1
#   mode: 'single'
mode: 'single'


# ==============================================================================
# PIMBA PLOT — METADATA AND SAMPLE GROUPING
# ==============================================================================
#
# Plot mode generates downstream abundance and diversity visualizations.
# It is enabled from the launcher with '-g yes'.
# ------------------------------------------------------------------------------

# Path to the sample metadata file.
#
# The file should contain sample identifiers that match the identifiers in the
# abundance table. Verify delimiter, header names, spelling, and capitalization.
metadata: '/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/pimba_smk/test_data/mapping_file_COI.csv'

# Metadata column used to group samples in plots and summaries.
#
# Current value:
#   'Species'
#
# This column must exist exactly as written in the metadata header.
#
# Set this YAML value to false with quotes to disable grouping:
#   group_by: 'False'
group_by: 'Species'
