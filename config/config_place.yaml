# ==============================================================================
# PIMBA v3.0 — PIMBA Place configuration file
# ==============================================================================
#
# PIMBA Place performs phylogenetic placement of unclassified OTU/ASV sequences
# into an existing reference phylogeny. Rather than reconstructing a new tree
# containing all query sequences, it aligns each query against a fixed reference
# alignment and estimates the branch of the reference tree on which that query
# most likely belongs.
#
# The main stages represented in this configuration are:
#
#   1. Read one or more FASTA files containing unclassified OTUs/ASVs.
#   2. Optionally cluster or de-duplicate query sequences.
#   3. Align the query sequences to the existing reference alignment.
#   4. Estimate evolutionary-model parameters, when needed.
#   5. Place the aligned queries on the reference tree using EPA-ng.
#   6. Optionally summarize, visualize, and taxonomically interpret placements
#      with gappa and guppy.
#
# IMPORTANT INPUT CONSISTENCY REQUIREMENTS
#
#   - Use absolute paths for all input files.
#   - Sequence identifiers in 'reference-tree' and 'reference-alignment' must
#     match exactly.
#   - The reference alignment must already be aligned.
#   - The reference tree must have been inferred from the same reference
#     alignment, or from an equivalent alignment with matching taxa.
#   - Query FASTA headers should be unique within each input file.
#   - The taxonomy file must identify the reference sequences used in the tree.
#   - The sequence type selected by 'datatype' must match both query and
#     reference sequences.
#
# PIMBA Place can be enabled from the main launcher with '-l yes'. A complete
# example command is:
#
# bash pimba_smk_main.sh \
#   -p no \
#   -r no \
#   -g no \
#   -l yes \
#   -t 8 \
#   -c config/config.yaml \
#   -d .
#
# The final placement file is written as a '.jplace' at /results/03-placed/no_clustering/placed/
# and can be visualized in iTOL. This configuration additionally enables
# place-pipe outputs generated by gappa, such as heat trees, taxonomy
# assignments, and optional Krona summaries.
# ==============================================================================


# ==============================================================================
# INPUT DATA
# ==============================================================================
#
# This section defines the query sequences and the fixed reference framework
# used for phylogenetic placement.
#
# All paths should be absolute because some Snakemake features and external tools
# do not behave reliably with relative paths, particularly when shadow
# directories, containers, or cluster execution are used.
# ==============================================================================

data:

  # ---------------------------------------------------------------------------
  # Query FASTA files
  # ---------------------------------------------------------------------------
  #
  # List of FASTA files containing the unclassified OTUs or ASVs that will be
  # placed on the reference tree.
  #
  # A single file is still expressed as a YAML list:
  #
  # samples:
  #   - "/absolute/path/sample_1.fasta"
  #
  # Multiple files can be supplied by adding one list item per FASTA:
  #
  # samples:
  #   - "/absolute/path/sample_1.fasta"
  #   - "/absolute/path/sample_2.fasta"
  #
  # Each file is treated as a separate sample or placement dataset. The workflow
  # derives sample names from the input filenames, usually by removing the final
  # FASTA extension.
  #
  # Recommended filename characteristics:
  #   - use unique basenames;
  #   - avoid spaces and shell-special characters;
  #   - use '.fasta', '.fa', or another extension supported by the workflow;
  #   - ensure every FASTA record has a non-empty, unique sequence identifier.
  #
  # The current file contains the unassigned OTUs generated for all samples.
  samples:
    - "/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/place_smk/place_inputs/AllSamples_unassigned_otus.fasta"

  # ---------------------------------------------------------------------------
  # Reference phylogenetic tree
  # ---------------------------------------------------------------------------
  #
  # Reference tree in Newick format.
  #
  # Every leaf name in this tree must correspond exactly to a sequence identifier
  # in 'reference-alignment'. Differences in prefixes, suffixes, spaces, or
  # punctuation can cause the placement workflow to fail.
  #
  # A bifurcating maximum-likelihood tree with branch lengths is preferable
  # because EPA-ng uses the reference topology and branch lengths during
  # likelihood-based placement.
  #
  # The filename indicates that this tree was generated by RAxML and contains
  # bipartition support information.
  reference-tree: "/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/place_smk/place_inputs/RAxML_bipartitions.newick"

  # ---------------------------------------------------------------------------
  # Reference sequence alignment
  # ---------------------------------------------------------------------------
  #
  # Existing multiple-sequence alignment in FASTA format.
  #
  # The alignment must:
  #   - contain the same reference taxa as the tree;
  #   - use sequence identifiers matching the tree leaf names exactly;
  #   - represent the same marker and sequence type as the query FASTA;
  #   - contain aligned sequences of a common alignment width;
  #   - preserve homologous columns suitable for phylogenetic analysis.
  #
  reference-alignment: "/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/place_smk/place_inputs/assigned_ncbi_sequences_aligned_trimmed.fasta"

  # ---------------------------------------------------------------------------
  # Reference taxonomy table
  # ---------------------------------------------------------------------------
  #
  # Tab-delimited file mapping each reference taxon identifier to its complete
  # taxonomic path.
  #
  # The identifier column must correspond to the reference sequence identifiers
  # used in the tree and alignment. The taxonomy path should be consistently
  # formatted across all references.
  #
  # This file is used by downstream taxonomic-placement tools, particularly
  # gappa assign, to infer taxonomy for placed queries from their positions in
  # the reference tree.
  #
  # Common problems include:
  #   - identifiers that do not match the reference tree;
  #   - inconsistent numbers of taxonomic ranks;
  #   - mixed delimiters;
  #   - blank taxonomic paths;
  #   - duplicated reference identifiers.
  taxonomy-file: "/mnt/c/Users/c0519/Desktop/ITV/pimba_dev/place_smk/place_inputs/taxonpath_final.tsv"


# ==============================================================================
# PIPELINE SETTINGS
# ==============================================================================
#
# These options select the overall analytical strategy and the external tools
# used by the workflow.
# ==============================================================================

settings:

  # ---------------------------------------------------------------------------
  # Sequence datatype
  # ---------------------------------------------------------------------------
  #
  # Type of sequences in both the query FASTA files and reference alignment.
  #
  # Valid values:
  #   "nt" — nucleotide sequences, including DNA amplicons such as COI, ITS,
  #          and 16S;
  #   "aa" — amino-acid sequences.
  #
  # The current analysis uses nucleotide metabarcoding sequences.
  datatype: "nt"

  # ---------------------------------------------------------------------------
  # Query clustering strategy
  # ---------------------------------------------------------------------------
  #
  # One or more preprocessing strategies used before placement.
  #
  # Valid values documented by the workflow:
  #   "no_clustering" — place every input query sequence without Swarm
  #                     clustering;
  #   "swarm"         — cluster related query sequences with Swarm before
  #                     placement.
  #
  # This field is a YAML list because the workflow can potentially generate and
  # compare outputs for more than one clustering strategy in the same run.
  #
  # Current behavior:
  #   - only "no_clustering" is active;
  #   - the commented "swarm" item is not executed.
  #
  # "no_clustering" is the safest choice when each OTU/ASV identifier must be
  # preserved independently. Swarm may reduce computational work but changes
  # the set of sequence units entering placement.
  clustering-tool:
    - "no_clustering"
    # To additionally run a Swarm-clustered branch, uncomment the next line:
    # - "swarm"

  # ---------------------------------------------------------------------------
  # Chunkify / unchunkify optimization
  # ---------------------------------------------------------------------------
  #
  # When True, the workflow uses gappa chunkify to:
  #   - detect duplicate query sequences;
  #   - distribute query sequences across balanced chunk files;
  #   - reduce redundant placement calculations;
  #   - improve workload balance in large parallel or cluster executions.
  #
  # After placement, gappa unchunkify reconstructs the results so they correspond
  # to the original sequence identifiers and input samples.
  #
  # Recommended:
  #   - True for large projects, many samples, repeated sequences, or cluster
  #     execution;
  #   - False for very small test datasets or when troubleshooting the most
  #     direct query-to-placement path.
  #
  # YAML Boolean values are conventionally written as 'true'/'false'. The
  # existing capitalized value is valid in common YAML 1.1 parsers and is
  # preserved here.
  use-chunkify: True

  # ---------------------------------------------------------------------------
  # Query-to-reference alignment tool
  # ---------------------------------------------------------------------------
  #
  # Tool used to align query sequences to the fixed reference alignment.
  #
  # Valid value in the current workflow:
  #   "hmmer"
  #
  # HMMER builds a profile hidden Markov model from the reference alignment and
  # aligns query sequences against that profile. This preserves the coordinate
  # framework required for phylogenetic placement.
  alignment-tool: "hmmer"

  # ---------------------------------------------------------------------------
  # Phylogenetic-placement engine
  # ---------------------------------------------------------------------------
  #
  # Tool used to calculate likelihood-based placements on the reference tree.
  #
  # Valid value in the current workflow:
  #   "epa-ng"
  #
  # EPA-ng evaluates possible branches for each query and writes likelihood
  # weights and related placement information to a '.jplace' file.
  placement-tool: "epa-ng"

  # ---------------------------------------------------------------------------
  # Output directory
  # ---------------------------------------------------------------------------
  #
  # Root directory for all PIMBA Place results.
  #
  # This path is relative to the workflow working directory. Unlike the input
  # paths above, the original configuration intentionally uses a relative output
  # path so results remain inside the PIMBA project directory.
  #
  # Expected subdirectories are created by the workflow for clustering modes,
  # alignments, placements, summaries, and visualizations.
  outdir: "results/04-place/"


# ==============================================================================
# TOOL PARAMETERS
# ==============================================================================
#
# This section exposes detailed parameters for the individual programs used by
# the placement workflow.
#
# Parameters under a tool subsection are only used when the corresponding tool
# or feature is enabled in 'settings'.
# ==============================================================================

params:

  # ---------------------------------------------------------------------------
  # Global thread count
  # ---------------------------------------------------------------------------
  #
  # Default number of CPU threads made available to compatible workflow rules.
  #
  # Some tool-specific thread settings are present below but commented out. In
  # those cases, the workflow commonly inherits this global value or uses the
  # rule-specific value defined in the Snakefile.
  #
  # Keep this value consistent with the CPU allocation passed to Snakemake or the
  # scheduler.
  threads: 8


  # ===========================================================================
  # SWARM PARAMETERS
  # ===========================================================================
  #
  # Used only when "swarm" is included under:
  #   settings -> clustering-tool
  #
  # Swarm performs local, iterative amplicon clustering without requiring a
  # global percentage-identity threshold.
  # ---------------------------------------------------------------------------

  swarm:

    # Optional tool-specific thread setting.
    #
    # It is currently commented out, so it does not override the global or
    # rule-level thread allocation.
    # threads: 1

    # Maximum number of nucleotide differences allowed when linking sequences
    # during the local Swarm clustering process.
    #
    # A value of 1 corresponds to the classic fine-scale Swarm setting, often
    # used to preserve high sequence resolution.
    differences: 1

    # Enable Swarm's fastidious mode.
    #
    # When True, Swarm performs an additional step intended to connect small
    # clusters to larger clusters when justified by sequence relationships.
    #
    # This can reduce isolated low-abundance clusters but increases computation.
    fastidious: True


  # ===========================================================================
  # GAPPA CHUNKIFY / UNCHUNKIFY PARAMETERS
  # ===========================================================================
  #
  # Used only when:
  #   settings -> use-chunkify: True
  #
  # Chunkify prepares balanced, de-duplicated query chunks. Unchunkify maps the
  # placement results back to the original samples and sequence identifiers.
  # ---------------------------------------------------------------------------

  chunkify:

    # Hash algorithm used to identify identical sequence strings.
    #
    # Valid values:
    #   "SHA1"
    #   "SHA256"
    #   "MD5"
    #
    # SHA1 provides a practical balance between speed and negligible collision
    # risk for ordinary sequence de-duplication.
    hash-function: "SHA1"

    # Minimum abundance required for a sequence to enter the chunkified dataset.
    #
    # Sequences with abundance below this threshold are excluded.
    #
    # A value of 1 retains every observed sequence and therefore avoids
    # abundance-based filtering at this stage.
    min-abundance: 1

    # Maximum target number of query sequences written to each chunk.
    #
    # Larger chunks:
    #   - create fewer files and workflow jobs;
    #   - require more time and memory per placement job.
    #
    # Smaller chunks:
    #   - improve parallel distribution;
    #   - create more files and scheduling overhead.
    #
    # The current value is suitable for relatively large datasets but should be
    # tuned to available memory and cluster scheduling behavior.
    chunk-size: 50000

    # Maximum number of '.jplace' files held in memory during unchunkify.
    #
    # A value of 0 means no explicit cache limit, so all required placement files
    # may be retained in memory.
    #
    # Set this to a positive number if unchunkify runs out of memory. The
    # appropriate value depends on '.jplace' file size and available RAM.
    #
    # The original comment suggests approximately 100,000 as a possible starting
    # point, but the ideal value should be established empirically.
    jplace-cache-size: 0


  # ===========================================================================
  # HMMER PARAMETERS
  # ===========================================================================
  #
  # Used only when:
  #   settings -> alignment-tool: "hmmer"
  #
  # The typical sequence is:
  #   1. hmmbuild creates a profile HMM from the reference alignment;
  #   2. hmmsearch filters or detects compatible query sequences;
  #   3. hmmalign aligns retained queries to the reference profile.
  # ---------------------------------------------------------------------------

  hmmer:

    # -------------------------------------------------------------------------
    # hmmbuild
    # -------------------------------------------------------------------------
    hmmbuild:

      # Additional raw command-line arguments passed to hmmbuild.
      #
      # Leave empty to use workflow defaults. Advanced users can add supported
      # HMMER flags here without editing the workflow rule.
      extra: ""

    # -------------------------------------------------------------------------
    # hmmalign
    # -------------------------------------------------------------------------
    hmmalign:

      # Whether hmmalign should trim output to positions aligned to consensus
      # profile columns.
      #
      # False preserves the workflow's full alignment representation, including
      # insert information as handled by the pipeline.
      #
      # Changing this can alter alignment width and compatibility with the
      # reference coordinate system, so it should be tested carefully.
      trim: False

    # -------------------------------------------------------------------------
    # hmmsearch
    # -------------------------------------------------------------------------
    #
    # hmmsearch is used to exclude sequences that do not match the reference
    # profile sufficiently well before alignment and placement.
    hmmsearch:

      # E-value threshold used to retain query sequences.
      #
      # Queries with weaker matches than this threshold may be excluded before
      # placement.
      #
      # Smaller values are more stringent:
      #   0.01  = current moderate threshold
      #   1e-5  = more stringent example
      #
      # A threshold that is too strict can remove divergent but biologically
      # valid sequences. A threshold that is too permissive can pass unrelated
      # or poor-quality sequences into the placement analysis.
      E: 0.01


  # ===========================================================================
  # RAxML-NG PARAMETERS
  # ===========================================================================
  #
  # RAxML-NG is used when EPA-ng model parameters are not provided explicitly.
  # In that case, the workflow evaluates the fixed reference tree and alignment
  # to estimate parameters for the selected evolutionary model.
  # ---------------------------------------------------------------------------

  raxml-ng:

    # Number of CPU threads assigned specifically to RAxML-NG.
    #
    # This explicit value overrides or supplements the global setting according
    # to the workflow rule.
    threads: 2

    # Additional raw RAxML-NG command-line arguments.
    #
    # Leave empty to use the workflow's standard tree-evaluation command.
    extra: ""


  # ===========================================================================
  # EPA-NG PARAMETERS
  # ===========================================================================
  #
  # Used only when:
  #   settings -> placement-tool: "epa-ng"
  #
  # EPA-ng places each aligned query sequence onto one or more candidate branches
  # of the fixed reference tree and records likelihood-based placement weights.
  # ---------------------------------------------------------------------------

  epa-ng:

    # -------------------------------------------------------------------------
    # Fully parameterized evolutionary model
    # -------------------------------------------------------------------------
    #
    # This can be either:
    #
    #   1. A complete RAxML-NG model string containing estimated parameters,
    #      for example:
    #
    #      GTR{0.7/1.8/1.2/0.6/3.0/1.0}
    #      +FU{0.25/0.23/0.30/0.22}
    #      +G4{0.47}
    #
    #   2. A path to a RAxML-NG model file, commonly a 'raxml.bestModel' file.
    #
    #   3. An empty string.
    #
    # With an empty string, the workflow runs RAxML-NG to evaluate the reference
    # tree and estimate the model parameters automatically using 'model' below.
    #
    # Providing the exact model file from the original reference-tree inference
    # is generally preferable when it is available because it ensures that
    # placement uses the same parameterization as the reference phylogeny.
    model-params: ""

    # Base evolutionary model used by RAxML-NG when 'model-params' is empty.
    #
    # Current value:
    #   "GTR+G"
    #
    # GTR models nucleotide substitutions, while +G allows evolutionary rates to
    # vary across alignment sites according to a gamma distribution.
    #
    # This value should ideally match the model used to infer the reference tree,
    # or at least be a scientifically reasonable model for the marker and
    # reference alignment.
    #
    # For amino-acid data, an amino-acid substitution model would be required
    # instead of GTR.
    model: "GTR+G"


  # ===========================================================================
  # GAPPA POST-PLACEMENT PARAMETERS
  # ===========================================================================
  #
  # gappa processes '.jplace' files to create visual summaries and infer
  # taxonomy from placement positions.
  # ---------------------------------------------------------------------------

  gappa:

    # -------------------------------------------------------------------------
    # Heat-tree visualization
    # -------------------------------------------------------------------------
    #
    # Heat trees map placement abundance or mass onto the branches of the
    # reference phylogeny. They are valuable for checking where queries are
    # concentrated and whether placements occur in biologically plausible
    # regions of the tree.
    heat-tree:

      # Whether to produce a separate heat tree for every input sample.
      #
      # False:
      #   - generate the combined overview tree;
      #   - avoid potentially large numbers of per-sample tree files.
      #
      # True:
      #   - additionally generate individual sample-specific heat trees;
      #   - useful for comparing placement distributions among samples;
      #   - may produce many files for large studies.
      #
      # The workflow always produces the combined overview heat tree.
      sample-trees: False

      # Output formats generated for the heat tree.
      #
      # Supported values:
      #   "newick"   — tree structure with branch annotations suitable for
      #                compatible tree viewers;
      #   "nexus"    — NEXUS tree format;
      #   "phyloxml" — XML-based phylogenetic format;
      #   "svg"      — directly viewable vector image.
      #
      # The current configuration creates:
      #   - an SVG image for immediate visualization;
      #   - a Newick file for downstream tree software such as iTOL.
      formats:
        - "svg"
        - "newick"

      # Reorder the visual tree by ladderizing its branches.
      #
      # Ladderization changes only display order, not topology or placements.
      # It often makes large trees easier to inspect.
      svg-tree-ladderize: True

      # Minimum placement value represented using the normal heat-tree color
      # scale.
      #
      # Values below this threshold use 'under-color'.
      min-value: 1.0

      # Color assigned to branches or values below 'min-value'.
      #
      # Hexadecimal color:
      #   "#808080" = medium gray
      #
      # Keep the value quoted because '#' begins a YAML comment outside strings.
      under-color: "#808080"

    # -------------------------------------------------------------------------
    # Taxonomic assignment from placements
    # -------------------------------------------------------------------------
    #
    # gappa assign interprets the placement positions in relation to the
    # reference taxonomy supplied under 'data -> taxonomy-file'.
    assign:

      # Whether to allow labels representing distant taxonomic assignments.
      #
      # False is more conservative and reduces the presentation of assignments
      # derived from remote or weakly localized placements.
      distant-label: False

      # Attempt to resolve incomplete taxonomic paths in the reference taxonomy.
      #
      # True helps gappa process references whose taxonomy lacks one or more
      # intermediate ranks. The quality of the result still depends on consistent
      # taxonomy formatting.
      resolve-missing-paths: True

      # Generate Krona-compatible or Krona visualization output.
      #
      # Krona provides an interactive hierarchical display of taxonomic
      # composition in a web browser.
      krona: True


  # ===========================================================================
  # GUPPY PARAMETERS
  # ===========================================================================
  #
  # Guppy is a collection of utilities for manipulating and comparing
  # phylogenetic-placement files.
  # ---------------------------------------------------------------------------

  guppy:

    # -------------------------------------------------------------------------
    # Faith's phylogenetic diversity (FPD)
    # -------------------------------------------------------------------------
    fpd:

      # Whether pendant-edge lengths are included in phylogenetic-diversity
      # calculations.
      #
      # False:
      #   calculate diversity primarily from the reference-tree branches covered
      #   by placements, excluding the query-specific pendant component.
      #
      # True:
      #   include the pendant distance from the placement location to the query,
      #   which can increase the contribution of divergent query sequences.
      include-pendant: False
